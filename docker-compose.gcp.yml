services:
  cockroachdb:
    image: cockroachdb/cockroach:latest-v24.1
    command: start-single-node --insecure --store=attrs=ssd,path=/var/lib/cockroach/
    restart: unless-stopped
    volumes:
      - cockroach-data:/var/lib/cockroach
    ports:
      - "127.0.0.1:26257:26257"
      - "127.0.0.1:8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health?ready=1"]
      interval: 5s
      timeout: 5s
      retries: 12

  nakama:
    image: registry.heroiclabs.com/heroiclabs/nakama:3.37.0
    restart: unless-stopped
    depends_on:
      cockroachdb:
        condition: service_healthy
    entrypoint:
      - "/bin/sh"
      - "-ecx"
      - |
        /nakama/nakama migrate up --database.address root@cockroachdb:26257 &&
        exec /nakama/nakama \
          --name ${NAKAMA_NODE_NAME:-nakama-gcp-1} \
          --database.address root@cockroachdb:26257 \
          --logger.level INFO \
          --matchmaker.interval_sec 1 \
          --socket.server_key ${NAKAMA_SERVER_KEY} \
          --runtime.http_key ${NAKAMA_HTTP_KEY} \
          --console.username ${NAKAMA_CONSOLE_USERNAME} \
          --console.password ${NAKAMA_CONSOLE_PASSWORD} \
          --session.token_expiry_sec 7200 \
          --runtime.path /nakama/data/modules
    volumes:
      - ./server/modules:/nakama/data/modules
    ports:
      - "127.0.0.1:7349:7349"
      - "127.0.0.1:7350:7350"
      - "127.0.0.1:7351:7351"

  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on:
      - nakama
    environment:
      NAKAMA_DOMAIN: ${NAKAMA_DOMAIN}
    volumes:
      - ./deploy/gcp/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    ports:
      - "80:80"
      - "443:443"

volumes:
  cockroach-data:
  caddy-data:
  caddy-config:
